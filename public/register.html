<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - TaskFlow</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">TaskFlow</a>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/about">About</a>
      <a href="/login">Log In</a>
    </div>
  </nav>

  <div class="container" style="max-width: 440px; margin-top: 60px;">
    <div class="card">
      <h2 style="text-align: center; margin-bottom: 24px;">Create Your Account</h2>

      <form id="register-form">
        <div class="form-group">
          <label for="name">Full Name</label>
          <!-- BUG: No required attribute -->
          <input type="text" id="name" name="name" placeholder="John Doe">
          <div class="error">Name is required</div>
        </div>

        <div class="form-group">
          <label for="reg-email">Email Address</label>
          <!-- BUG: type is text, not email -->
          <input type="text" id="reg-email" name="email" placeholder="you@example.com">
          <div class="error">Please enter a valid email</div>
        </div>

        <div class="form-group">
          <label for="reg-password">Password</label>
          <!-- BUG: No password strength requirements shown -->
          <input type="password" id="reg-password" name="password" placeholder="Create a password">
          <div class="error">Password must be at least 8 characters</div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" name="confirmPassword" placeholder="Confirm your password">
          <div class="error">Passwords do not match</div>
        </div>

        <!-- BUG: Terms checkbox has no link to actual terms page -->
        <div style="margin-bottom: 20px;">
          <label style="display: flex; align-items: flex-start; gap: 8px; font-size: 13px; cursor: pointer;">
            <input type="checkbox" id="terms" style="margin-top: 2px;">
            <span>I agree to the <a href="/terms" style="color: #667eea;">Terms of Service</a> and <a href="/privacy" style="color: #667eea;">Privacy Policy</a></span>
          </label>
        </div>

        <button type="submit" class="btn" id="register-btn">Create Account</button>

        <div id="register-error" style="display:none; color: #ef4444; font-size: 13px; text-align: center; margin-top: 12px;"></div>
        <div id="register-success" style="display:none; color: #22c55e; font-size: 13px; text-align: center; margin-top: 12px;"></div>
      </form>

      <div style="text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid #e5e7eb;">
        <p style="font-size: 13px; color: #6b7280;">
          Already have an account? <a href="/login" style="color: #667eea; font-weight: 600;">Log in</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('register-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      let hasError = false;

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;
      const terms = document.getElementById('terms').checked;

      // Reset errors
      document.querySelectorAll('.form-group').forEach(g => g.classList.remove('has-error'));

      // BUG: Validation exists but password match check has wrong logic
      if (!name) {
        document.getElementById('name').parentElement.classList.add('has-error');
        hasError = true;
      }

      // BUG: Uses includes('@') instead of proper email regex
      if (!email || !email.includes('@')) {
        document.getElementById('reg-email').parentElement.classList.add('has-error');
        hasError = true;
      }

      if (password.length < 8) {
        document.getElementById('reg-password').parentElement.classList.add('has-error');
        hasError = true;
      }

      // BUG: Compares with !== but uses wrong variable name in error display
      if (password !== confirmPassword) {
        document.getElementById('confirm-password').parentElement.classList.add('has-error');
        hasError = true;
      }

      // BUG: Terms checkbox not validated — can register without agreeing
      if (hasError) return;

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });

        const data = await res.json();

        if (data.success) {
          document.getElementById('register-success').textContent = 'Account created! Redirecting to login...';
          document.getElementById('register-success').style.display = 'block';
          // BUG: 5-second redirect delay
          setTimeout(() => { window.location.href = '/login'; }, 5000);
        } else {
          document.getElementById('register-error').textContent = data.error || 'Registration failed';
          document.getElementById('register-error').style.display = 'block';
        }
      } catch (err) {
        document.getElementById('register-error').textContent = 'Network error. Please try again.';
        document.getElementById('register-error').style.display = 'block';
      }
    });
  </script>
</body>
</html>
