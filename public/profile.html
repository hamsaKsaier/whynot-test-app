<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - TaskFlow</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">TaskFlow</a>
    <div class="nav-links">
      <a href="/dashboard">Dashboard</a>
      <a href="/profile">Profile</a>
      <a href="/" id="logout-btn" style="color: #fca5a5;">Logout</a>
    </div>
  </nav>

  <div class="container" style="max-width: 600px;">
    <div class="card">
      <div class="profile-header">
        <!-- BUG: Avatar has no alt text / aria-label -->
        <div class="avatar" id="avatar-initial">A</div>
        <div>
          <h2 id="profile-name">Admin User</h2>
          <p style="color: #6b7280; font-size: 14px;" id="profile-email">admin@test.com</p>
          <!-- BUG: Member since date is hardcoded -->
          <p style="color: #9ca3af; font-size: 12px;">Member since January 2023</p>
        </div>
      </div>

      <form id="profile-form">
        <div class="form-group">
          <label for="profile-name-input">Display Name</label>
          <input type="text" id="profile-name-input" value="Admin User">
        </div>

        <div class="form-group">
          <label for="profile-email-input">Email</label>
          <!-- BUG: Email field is editable but changes don't persist -->
          <input type="text" id="profile-email-input" value="admin@test.com">
        </div>

        <div class="form-group">
          <label for="profile-bio">Bio</label>
          <!-- BUG: No maxlength on textarea -->
          <textarea id="profile-bio" rows="3" placeholder="Tell us about yourself..."></textarea>
        </div>

        <div class="form-group">
          <label for="profile-timezone">Timezone</label>
          <!-- BUG: Only 3 timezone options -->
          <select id="profile-timezone">
            <option value="utc">UTC</option>
            <option value="est">Eastern (EST)</option>
            <option value="pst">Pacific (PST)</option>
          </select>
        </div>

        <!-- BUG: Save button doesn't actually save to server -->
        <button type="submit" class="btn">Save Changes</button>
        <div id="profile-success" style="display:none; color: #22c55e; font-size: 13px; text-align: center; margin-top: 12px;">
          Profile updated successfully!
        </div>
      </form>
    </div>

    <!-- Danger zone -->
    <div class="card" style="border-color: #fecaca;">
      <h2 style="color: #dc2626;">Danger Zone</h2>
      <p style="font-size: 13px; color: #6b7280; margin-bottom: 16px;">
        Once you delete your account, there is no going back. Please be certain.
      </p>
      <!-- BUG: Delete button has no confirmation -->
      <button class="btn btn-danger" onclick="alert('Account deletion not implemented')">
        Delete Account
      </button>
    </div>
  </div>

  <script>
    // BUG: No auth check on profile page
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    if (user.name) {
      document.getElementById('profile-name').textContent = user.name;
      document.getElementById('profile-name-input').value = user.name;
      document.getElementById('avatar-initial').textContent = user.name.charAt(0).toUpperCase();
    }
    if (user.email) {
      document.getElementById('profile-email').textContent = user.email;
      document.getElementById('profile-email-input').value = user.email;
    }

    document.getElementById('profile-form').addEventListener('submit', function(e) {
      e.preventDefault();
      // BUG: Just shows success message, doesn't actually save anything
      document.getElementById('profile-success').style.display = 'block';
      setTimeout(() => {
        document.getElementById('profile-success').style.display = 'none';
      }, 3000);
    });
  </script>
</body>
</html>
